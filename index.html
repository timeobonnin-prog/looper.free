<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guerrier cybernétique · Falaise</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b12;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* Carte cinéma 8K */
    .cinema-card {
      position: relative;
      width: 1200px;
      max-width: 98vw;
      aspect-ratio: 16 / 9;
      background: #12121f;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(120, 80, 255, 0.15);
      transition: transform 0.2s ease;
    }

    .cinema-card:hover {
      transform: scale(1.005);
    }

    /* Conteneur principal de la scène */
    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 40%, #1a1a2e, #07070e);
      overflow: hidden;
    }

    /* =====  FOND / CIEL APOCALYPTIQUE ===== */
    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #0c0b1a 0%, #19162b 40%, #22203b 70%, #1c1b30 100%);
      z-index: 0;
    }

    /* Nuages tourbillonnants (multi-couches) */
    .cloud-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.5;
      background:
        radial-gradient(circle at 20% 30%, rgba(90, 70, 160, 0.25) 0%, transparent 50%),
        radial-gradient(circle at 80% 60%, rgba(60, 40, 130, 0.3) 0%, transparent 40%),
        radial-gradient(circle at 40% 80%, rgba(110, 80, 200, 0.2) 0%, transparent 35%),
        radial-gradient(circle at 70% 20%, rgba(40, 20, 80, 0.4) 0%, transparent 45%);
      filter: blur(6px) contrast(1.4);
      animation: cloudDrift 18s infinite alternate ease-in-out;
    }

    .cloud-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 10% 70%, rgba(160, 100, 255, 0.15) 0%, transparent 30%),
        radial-gradient(circle at 90% 30%, rgba(80, 50, 180, 0.2) 0%, transparent 40%);
      filter: blur(12px);
      animation: cloudDrift2 22s infinite alternate ease-in-out;
    }

    @keyframes cloudDrift {
      0% { transform: translateX(-8%) scale(1); }
      100% { transform: translateX(8%) scale(1.05); }
    }
    @keyframes cloudDrift2 {
      0% { transform: translateX(5%) scale(0.95); }
      100% { transform: translateX(-5%) scale(1.1); }
    }

    /* Éclairs violets */
    .lightning {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 25% 15%, rgba(180, 100, 255, 0.25) 0%, transparent 40%),
        radial-gradient(ellipse at 75% 25%, rgba(130, 60, 220, 0.2) 0%, transparent 35%),
        radial-gradient(ellipse at 55% 55%, rgba(200, 120, 255, 0.08) 0%, transparent 50%);
      animation: lightningFlicker 6s infinite alternate;
    }

    .lightning::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 20%;
      width: 60%;
      height: 40%;
      background: radial-gradient(ellipse at 30% 50%, rgba(170, 100, 255, 0.3), transparent 70%);
      filter: blur(20px);
      animation: bolt 7s infinite alternate;
    }

    @keyframes lightningFlicker {
      0%, 100% { opacity: 0.6; }
      30% { opacity: 0.9; }
      60% { opacity: 0.4; }
      85% { opacity: 0.8; }
    }
    @keyframes bolt {
      0% { transform: translateX(-5%) scale(1); opacity: 0.5; }
      50% { transform: translateX(10%) scale(1.2); opacity: 0.9; }
      100% { transform: translateX(-3%) scale(0.9); opacity: 0.4; }
    }

    /* =====  FALAISE / SOL ===== */
    .cliff {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 45%;
      z-index: 3;
      background: linear-gradient(0deg, #0f0f1a 0%, #1a1a2e 40%, transparent 100%);
      clip-path: polygon(0% 40%, 10% 35%, 20% 45%, 35% 30%, 50% 48%, 65% 25%, 80% 40%, 100% 30%, 100% 100%, 0% 100%);
    }

    .cliff::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(30, 25, 50, 0.7) 0%, transparent 60%),
        linear-gradient(45deg, rgba(60, 40, 90, 0.3) 0%, transparent 70%);
      backdrop-filter: blur(1px);
      clip-path: polygon(0% 40%, 10% 35%, 20% 45%, 35% 30%, 50% 48%, 65% 25%, 80% 40%, 100% 30%, 100% 100%, 0% 100%);
    }

    /* textures rocheuses (surimpression) */
    .rock-texture {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      z-index: 4;
      background:
        radial-gradient(circle at 15% 80%, rgba(70, 50, 100, 0.2) 0%, transparent 30%),
        radial-gradient(circle at 70% 90%, rgba(40, 30, 70, 0.3) 0%, transparent 40%),
        repeating-linear-gradient(45deg, rgba(20, 15, 30, 0.1) 0px, rgba(20, 15, 30, 0.1) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
    }

    /* =====  GUERRIER CYBERNÉTIQUE ===== */
    .warrior {
      position: absolute;
      bottom: 28%;
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      z-index: 10;
      width: 320px;
      height: 480px;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.8));
    }

    /* silhouette principale + armure */
    .warrior-silhouette {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 40% 30%, rgba(70, 60, 110, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 60% 70%, rgba(100, 70, 150, 0.1) 0%, transparent 50%);
      clip-path: polygon(40% 5%, 60% 5%, 70% 20%, 75% 35%, 80% 50%, 78% 65%, 70% 80%, 60% 90%, 50% 95%, 40% 90%, 30% 80%, 22% 65%, 20% 50%, 25% 35%, 30% 20%);
      background: #191929;
      box-shadow: inset 0 0 40px rgba(90, 50, 160, 0.2);
    }

    /* Détails armure (usée, givre, sang) */
    .armor-details {
      position: absolute;
      inset: 0;
      background:
        /* rayures métal */
        repeating-linear-gradient(45deg, transparent 0px, transparent 4px, rgba(120, 100, 160, 0.05) 4px, rgba(120, 100, 160, 0.05) 5px),
        repeating-linear-gradient(-45deg, transparent 0px, transparent 6px, rgba(80, 60, 120, 0.04) 6px, rgba(80, 60, 120, 0.04) 7px),
        /* givre / givre */
        radial-gradient(circle at 30% 20%, rgba(200, 220, 255, 0.08) 0%, transparent 30%),
        radial-gradient(circle at 70% 50%, rgba(180, 200, 255, 0.06) 0%, transparent 25%),
        /* sang (accents chauds) */
        radial-gradient(circle at 20% 60%, rgba(160, 20, 20, 0.15) 0%, transparent 20%),
        radial-gradient(circle at 75% 80%, rgba(180, 30, 30, 0.1) 0%, transparent 18%),
        radial-gradient(circle at 45% 40%, rgba(140, 10, 10, 0.08) 0%, transparent 15%);
      clip-path: polygon(40% 5%, 60% 5%, 70% 20%, 75% 35%, 80% 50%, 78% 65%, 70% 80%, 60% 90%, 50% 95%, 40% 90%, 30% 80%, 22% 65%, 20% 50%, 25% 35%, 30% 20%);
    }

    /* visage / regard déterminé */
    .face {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 28%;
      height: 20%;
      background: radial-gradient(ellipse at 50% 40%, #3a2e4a 0%, #1f172b 80%);
      border-radius: 50% 50% 40% 40% / 60% 60% 30% 30%;
      box-shadow: inset 0 -8px 15px rgba(0, 0, 0, 0.6);
    }

    .face::after {
      content: '';
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 40%;
      background: radial-gradient(ellipse at 30% 40%, #6a5a7a 0%, #2f253f 70%);
      border-radius: 50%;
      filter: blur(2px);
      opacity: 0.5;
    }

    /* yeux cybernétiques (lueur violette) */
    .eye {
      position: absolute;
      top: 28%;
      width: 12%;
      height: 10%;
      background: radial-gradient(circle at 40% 40%, #b080ff 0%, #5a2a8a 70%);
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(160, 80, 255, 0.6), 0 0 30px rgba(120, 40, 200, 0.3);
      filter: blur(0.5px);
    }
    .eye.left { left: 22%; }
    .eye.right { right: 22%; }

    .eye::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 15%;
      width: 30%;
      height: 30%;
      background: white;
      border-radius: 50%;
      filter: blur(1px);
      opacity: 0.5;
    }

    /* cheveux mouillés (traits) */
    .hair {
      position: absolute;
      top: 5%;
      left: 10%;
      width: 80%;
      height: 25%;
      background:
        repeating-linear-gradient(70deg, transparent 0px, transparent 8px, rgba(30, 25, 40, 0.4) 8px, rgba(30, 25, 40, 0.4) 9px),
        repeating-linear-gradient(-70deg, transparent 0px, transparent 10px, rgba(40, 35, 55, 0.3) 10px, rgba(40, 35, 55, 0.3) 11px);
      filter: blur(0.5px);
      clip-path: polygon(10% 0%, 90% 0%, 85% 60%, 70% 80%, 50% 85%, 30% 80%, 15% 60%);
      opacity: 0.7;
    }

    .hair::after {
      content: '';
      position: absolute;
      top: 40%;
      left: 0;
      width: 100%;
      height: 60%;
      background:
        repeating-linear-gradient(60deg, transparent 0px, transparent 6px, rgba(50, 40, 60, 0.2) 6px, rgba(50, 40, 60, 0.2) 7px);
      filter: blur(1px);
    }

    /* =====  ÉPÉE ÉNERGÉTIQUE FUMANTE ===== */
    .sword {
      position: absolute;
      bottom: 55%;
      right: -35%;
      width: 150px;
      height: 280px;
      transform: rotate(20deg) scale(0.9);
      z-index: 15;
      filter: drop-shadow(0 0 30px rgba(160, 80, 255, 0.3));
    }

    .blade {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 85%;
      background: linear-gradient(180deg, #c090ff 0%, #8a4ad0 40%, #4a1a7a 80%, #2a0a4a 100%);
      border-radius: 20px 20px 4px 4px;
      box-shadow: 0 0 30px rgba(180, 100, 255, 0.5), 0 0 60px rgba(140, 60, 220, 0.2);
      animation: bladePulse 2.5s infinite alternate ease-in-out;
    }

    .blade::before {
      content: '';
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 90%;
      background: radial-gradient(ellipse at 50% 30%, rgba(220, 180, 255, 0.6) 0%, transparent 70%);
      filter: blur(8px);
      opacity: 0.6;
    }

    /* fumée subtile sur la lame */
    .smoke {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 200px;
      background: radial-gradient(circle at 50% 30%, rgba(160, 140, 200, 0.08) 0%, transparent 60%),
        radial-gradient(circle at 30% 70%, rgba(120, 100, 170, 0.06) 0%, transparent 40%);
      filter: blur(10px) contrast(1.2);
      animation: smokeRise 4s infinite alternate ease-in-out;
      pointer-events: none;
    }

    @keyframes bladePulse {
      0% { opacity: 0.9; box-shadow: 0 0 30px rgba(180, 100, 255, 0.4); }
      100% { opacity: 1; box-shadow: 0 0 50px rgba(200, 130, 255, 0.7), 0 0 80px rgba(160, 80, 220, 0.3); }
    }
    @keyframes smokeRise {
      0% { transform: translateX(-50%) translateY(0) scale(0.9); opacity: 0.3; }
      100% { transform: translateX(-50%) translateY(-20px) scale(1.1); opacity: 0.6; }
    }

    /* =====  GOUTTES D'EAU (pluie / embruns) ===== */
    .droplets {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 20%, rgba(200, 220, 255, 0.15) 1px, transparent 1px),
        radial-gradient(circle at 30% 45%, rgba(180, 200, 255, 0.12) 1px, transparent 1px),
        radial-gradient(circle at 55% 15%, rgba(220, 240, 255, 0.1) 1px, transparent 1px),
        radial-gradient(circle at 70% 55%, rgba(190, 210, 255, 0.08) 1px, transparent 1px),
        radial-gradient(circle at 85% 30%, rgba(200, 220, 255, 0.12) 1px, transparent 1px),
        radial-gradient(circle at 15% 75%, rgba(180, 200, 255, 0.1) 1px, transparent 1px),
        radial-gradient(circle at 45% 80%, rgba(210, 230, 255, 0.08) 1px, transparent 1px),
        radial-gradient(circle at 65% 90%, rgba(190, 210, 255, 0.12) 1px, transparent 1px);
      background-size: 120px 120px;
      animation: dropletFall 12s linear infinite;
      opacity: 0.7;
      filter: blur(0.4px);
    }

    @keyframes dropletFall {
      0% { transform: translateY(-5%) scale(1); }
      100% { transform: translateY(10%) scale(0.95); }
    }

    /* =====  ÉCLAIRAGE / CONTRE-JOUR ===== */
    .rim-light {
      position: absolute;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      background:
        /* rim light violet (fort contre-jour) */
        radial-gradient(ellipse at 70% 20%, rgba(180, 100, 255, 0.2) 0%, transparent 40%),
        radial-gradient(ellipse at 30% 80%, rgba(100, 60, 200, 0.1) 0%, transparent 35%),
        /* fill light froid */
        radial-gradient(ellipse at 20% 40%, rgba(80, 120, 200, 0.05) 0%, transparent 30%),
        radial-gradient(ellipse at 80% 60%, rgba(60, 100, 180, 0.04) 0%, transparent 30%);
      mix-blend-mode: screen;
    }

    /* lumière dramatique en contre-jour (renforcée) */
    .backlight {
      position: absolute;
      inset: 0;
      z-index: 26;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 40% 10%, rgba(130, 80, 220, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 90%, rgba(90, 60, 180, 0.08) 0%, transparent 40%);
      mix-blend-mode: overlay;
    }

    /* =====  POST-TRAITEMENT (vignette, grain, contraste) ===== */
    .post-processing {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      /* Vignette */
      box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.7), inset 0 0 60px rgba(0, 0, 0, 0.4);
      /* grain film 35mm (overlay) */
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.08 0"/></filter><rect width="100%" height="100%" filter="url(%23grain)" opacity="0.3"/></svg>');
      background-size: 300px 300px;
      background-blend-mode: overlay;
      opacity: 0.25;
      mix-blend-mode: overlay;
    }

    /* courbe de contraste en S (simulée via overlay) */
    .contrast-curve {
      position: absolute;
      inset: 0;
      z-index: 31;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0, 0, 0, 0.3) 100%);
      mix-blend-mode: multiply;
      opacity: 0.2;
    }

    /* sharpening local (simulé) */
    .sharpening {
      position: absolute;
      inset: 0;
      z-index: 32;
      pointer-events: none;
      filter: contrast(1.1) brightness(1.02);
      mix-blend-mode: hard-light;
      opacity: 0.08;
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.02), transparent 70%);
    }

    /* =====  ÉLÉMENTS SUPPLÉMENTAIRES (vent, éclairs) ===== */
    .wind-lines {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        repeating-linear-gradient(100deg, transparent 0px, transparent 40px, rgba(180, 160, 220, 0.02) 40px, rgba(180, 160, 220, 0.02) 41px),
        repeating-linear-gradient(80deg, transparent 0px, transparent 60px, rgba(150, 130, 200, 0.015) 60px, rgba(150, 130, 200, 0.015) 61px);
      animation: windShift 12s infinite alternate ease-in-out;
    }

    @keyframes windShift {
      0% { transform: translateX(-5%) scale(1); }
      100% { transform: translateX(5%) scale(1.03); }
    }

    /* petit détail : éclats violets */
    .sparks {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background:
        radial-gradient(circle at 45% 12%, rgba(200, 150, 255, 0.08) 0%, transparent 20%),
        radial-gradient(circle at 75% 45%, rgba(160, 100, 220, 0.05) 0%, transparent 18%);
      animation: sparkFlicker 4s infinite alternate;
    }

    @keyframes sparkFlicker {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* =====  RESPONSIVE ===== */
    @media (max-width: 700px) {
      .warrior {
        transform: translateX(-50%) scale(0.6);
        bottom: 25%;
      }
      .sword {
        right: -45%;
        transform: rotate(25deg) scale(0.6);
      }
      .cinema-card {
        border-radius: 12px;
      }
      .droplets {
        background-size: 80px 80px;
      }
    }
  </style>
</head>
<body>
  <div class="cinema-card">
    <div class="scene">

      <!-- FOND CIEL -->
      <div class="sky"></div>

      <!-- NUAGES TOURBILLONNANTS -->
      <div class="cloud-layer"></div>

      <!-- ÉCLAIRS VIOLETS -->
      <div class="lightning"></div>

      <!-- VENT / TRAITS -->
      <div class="wind-lines"></div>

      <!-- ÉCLATS -->
      <div class="sparks"></div>

      <!-- FALAISE -->
      <div class="cliff"></div>
      <div class="rock-texture"></div>

      <!-- GUERRIER CYBERNÉTIQUE -->
      <div class="warrior">
        <div class="warrior-silhouette">
          <div class="armor-details"></div>
          <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
          </div>
          <div class="hair"></div>
        </div>
      </div>

      <!-- ÉPÉE ÉNERGÉTIQUE FUMANTE -->
      <div class="sword">
        <div class="blade"></div>
        <div class="smoke"></div>
      </div>

      <!-- GOUTTES D'EAU -->
      <div class="droplets"></div>

      <!-- ÉCLAIRAGES -->
      <div class="rim-light"></div>
      <div class="backlight"></div>

      <!-- POST-TRAITEMENT CINÉMA -->
      <div class="post-processing"></div>
      <div class="contrast-curve"></div>
      <div class="sharpening"></div>

    </div>
  </div>
</body>
</html>
